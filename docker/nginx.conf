# docker/nginx.conf
# Serves the Pantheon COO dashboard on port 3002.
# Proxies /api/* and /tasks, /execute, /health, etc. to the backend.
server {
    listen       3002;
    server_name  _;

    root  /usr/share/nginx/html;
    index dashboard.html;

    # Serve the dashboard SPA
    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # Proxy all API calls to the backend
    location ~ ^/(execute|tasks|health|stats|schedules|tools|memory|monitor|webhook) {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE support — disable buffering for /stream endpoints
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600;
    }

    # Gzip for static assets
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
