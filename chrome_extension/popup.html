<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Pantheon COO</h1>
  <label>API URL</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:8002" />
  <label>Token (JWT)</label>
  <input type="password" id="token" placeholder="Bearer token" />
  <label>Command</label>
  <textarea id="cmd" rows="4" placeholder="Ask the COO…"></textarea>
  <button id="btnExec">Execute</button>
  <button id="btnPage">Send page content to COO</button>
  <div id="tasks"></div>
  <script src="popup.js"></script>
</body>
</html>
